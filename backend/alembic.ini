[alembic]
script_location = migrations
path_separator = os
prepend_sys_path = src
# The URL is supplied by forgeml.core.config at runtime; it is a secret and is
# never written to a file that could be committed.
sqlalchemy.url =

[loggers]
keys = root

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
