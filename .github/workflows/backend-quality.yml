name: Backend quality

on:
  push:
    paths:
      - "backend/**"
      - ".github/workflows/backend-quality.yml"
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/backend-quality.yml"

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: backend

    # ADR-009 rules SQLite out as a metadata adapter: durable operation claims
    # depend on row-locking semantics it cannot express. The concurrency and
    # migration gates are therefore only meaningful against real PostgreSQL.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: forgeml
          POSTGRES_PASSWORD: forgeml
          POSTGRES_DB: forgeml
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U forgeml"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      FORGEML_TEST_DATABASE_URL: postgresql+psycopg://forgeml:forgeml@127.0.0.1:5432/forgeml

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements-dev.lock

      - name: Install locked development dependencies
        run: python -m pip install --require-hashes -r requirements-dev.lock

      - name: Verify runtime lock
        run: |
          python -m piptools compile pyproject.toml --resolver=backtracking --generate-hashes --strip-extras --no-header --no-emit-index-url --output-file /tmp/requirements.lock
          cmp requirements.lock /tmp/requirements.lock

      - name: Verify development lock
        run: |
          python -m piptools compile pyproject.toml --resolver=backtracking --generate-hashes --strip-extras --no-header --no-emit-index-url --extra dev --all-build-deps --allow-unsafe --output-file /tmp/requirements-dev.lock
          cmp requirements-dev.lock /tmp/requirements-dev.lock

      - name: Format
        run: python -m black --check src tests

      - name: Lint
        run: python -m ruff check src tests

      - name: Type check
        run: python -m mypy src tests

      - name: Install backend source
        run: python -m pip install --no-deps --no-build-isolation --editable .

      - name: Test with branch coverage
        run: |
          python -m coverage run --branch -m pytest tests/unit tests/integration tests/contract tests/architecture
          python -m coverage report --fail-under=95

      - name: Build locked package
        run: python -m build --no-isolation

      - name: Smoke installed wheel
        run: |
          python -m venv /tmp/forgeml-smoke
          /tmp/forgeml-smoke/bin/python -m pip install --require-hashes -r requirements.lock
          /tmp/forgeml-smoke/bin/python -m pip install --no-deps dist/*.whl
          cd /tmp
          /tmp/forgeml-smoke/bin/python "$GITHUB_WORKSPACE/backend/tests/smoke/installed_package_smoke.py"
