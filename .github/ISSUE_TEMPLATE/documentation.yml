name: Documentation issue
description: Something is wrong, missing, or misleading in the docs
labels: ["type:docs", "needs:triage"]
body:
  - type: input
    id: location
    attributes:
      label: Which document
      placeholder: README.md, PROJECT_STATUS.md, ADR-0XX, a docstring path...
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: What is wrong
      description: Quote the text if it is short.
    validations:
      required: true
  - type: textarea
    id: correction
    attributes:
      label: What it should say
  - type: checkboxes
    id: kind
    attributes:
      label: Kind
      options:
        - label: Factually wrong (contradicts the code)
        - label: Out of date (was true, no longer is)
        - label: Missing
        - label: Unclear
