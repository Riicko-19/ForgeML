<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 720" width="900" height="720" fill="none" role="img" aria-label="ForgeML software architecture: Client through FastAPI, Application, Ports, Adapters, to Docker and PostgreSQL. Dependencies point inward across the port boundary.">
  <style>
    .surface{fill:#ffffff}
    .frame{stroke:#e6e9ee}
    .card{fill:#ffffff;stroke:#e2e6ea}
    .cardA{fill:#f3f7ff;stroke:#cddffb}
    .cardG{fill:#f0faf5;stroke:#bde8d3}
    .band{fill:#f6f8fa;stroke:#e6e9ee}
    .ink{fill:#0b1220}.sub{fill:#59636e}.faint{fill:#8a94a1}
    .edge{stroke:#c2c9d2}.edgeIn{stroke:#2563eb}
    .accent{fill:#2563eb}.green{fill:#0f9d6b}
    text{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif}
    .mono{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}
    .lbl{fill:#8a94a1;font-size:11px;font-weight:600;letter-spacing:2}
    @media(prefers-color-scheme:dark){
      .surface{fill:#0d1117}.frame{stroke:#222932}
      .card{fill:#0f141b;stroke:#242c35}
      .cardA{fill:#111d31;stroke:#26436f}
      .cardG{fill:#0f2019;stroke:#1f5540}
      .band{fill:#12171e;stroke:#222932}
      .ink{fill:#e6edf3}.sub{fill:#9aa4af}.faint{fill:#6b7480}
      .edge{stroke:#3a424c}.edgeIn{stroke:#4c8dff}
      .accent{fill:#4c8dff}.green{fill:#33b088}
    }
  </style>
  <rect class="surface" width="900" height="720" rx="14"/>
  <rect class="frame" x="0.5" y="0.5" width="899" height="719" rx="14" fill="none"/>

  <text class="ink" x="48" y="52" font-size="20" font-weight="700">Software architecture</text>
  <text class="sub" x="48" y="74" font-size="13.5">Hexagonal. The call flows down; source dependencies point <tspan font-weight="700">inward</tspan> — nothing in the core imports a provider.</text>

  <!-- markers -->
  <defs>
    <marker id="d" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 1L8 5L0 9" fill="none" stroke="#c2c9d2" stroke-width="1.5"/></marker>
    <marker id="di" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 1L8 5L0 9" fill="none" stroke="#2563eb" stroke-width="1.6"/></marker>
  </defs>

  <!-- Client -->
  <g transform="translate(300,96)">
    <rect class="card" width="300" height="46" rx="10"/>
    <text class="ink" x="150" y="29" text-anchor="middle" font-size="14.5" font-weight="600">Client</text>
  </g>
  <path class="edge" d="M450 142v22" stroke-width="1.5" marker-end="url(#d)"/>

  <!-- API -->
  <g transform="translate(250,168)">
    <rect class="card" width="400" height="58" rx="10"/>
    <text class="lbl" x="20" y="24">HTTP API · FASTAPI</text>
    <text class="sub mono" x="20" y="44" font-size="12.5">/v1/packages · /deployments · /predict · /operations</text>
  </g>
  <path class="edge" d="M450 226v22" stroke-width="1.5" marker-end="url(#d)"/>

  <!-- Application -->
  <g transform="translate(210,252)">
    <rect class="card" width="480" height="64" rx="10"/>
    <text class="lbl" x="20" y="24">APPLICATION · USE CASES</text>
    <text class="ink mono" x="20" y="47" font-size="12.5">PackageService · DeploymentService · RouteManager</text>
  </g>

  <!-- domain aside -->
  <g transform="translate(700,252)">
    <rect class="band" width="150" height="64" rx="10"/>
    <text class="lbl" x="16" y="24">DOMAIN</text>
    <text class="sub" x="16" y="43" font-size="11.5">pure policy,</text>
    <text class="sub" x="16" y="57" font-size="11.5">no I/O</text>
  </g>
  <path class="edge" d="M690 284h10" stroke-width="1.5" marker-end="url(#d)"/>

  <!-- PORT BOUNDARY -->
  <g transform="translate(0,344)">
    <line class="edgeIn" x1="90" y1="0" x2="810" y2="0" stroke-width="1.4" stroke-dasharray="2 6"/>
    <rect class="cardA" x="330" y="-15" width="240" height="30" rx="15"/>
    <text class="accent" x="450" y="4" text-anchor="middle" font-size="11.5" font-weight="700" letter-spacing="1.5">PORT BOUNDARY</text>
  </g>
  <path class="edge" d="M450 316v14" stroke-width="1.5"/>

  <!-- Ports -->
  <g transform="translate(150,376)">
    <rect class="cardA" width="600" height="66" rx="10"/>
    <text class="lbl" x="20" y="24" style="fill:#2563eb">PORTS · interfaces the core owns</text>
    <text class="ink mono" x="20" y="48" font-size="12.5">RuntimeManager · PredictionGateway · ArtifactStore · Metadata repos</text>
  </g>

  <!-- inward dependency arrow (adapters -> ports) -->
  <path class="edgeIn" d="M450 520v-72" stroke-width="1.6" marker-end="url(#di)"/>
  <text class="accent" x="462" y="486" font-size="11.5" font-weight="600">implements ▲</text>
  <text class="faint" x="462" y="502" font-size="10.5">dependency points inward</text>

  <!-- Adapters -->
  <g transform="translate(150,520)">
    <rect class="card" width="600" height="66" rx="10"/>
    <text class="lbl" x="20" y="24">ADAPTERS · infrastructure</text>
    <text class="ink mono" x="20" y="48" font-size="12.5">DockerRuntimeManager · HttpPredictionGateway · SQLAlchemy · Filesystem</text>
  </g>
  <path class="edge" d="M300 586v26" stroke-width="1.5" marker-end="url(#d)"/>
  <path class="edge" d="M450 586v26" stroke-width="1.5" marker-end="url(#d)"/>
  <path class="edge" d="M600 586v26" stroke-width="1.5" marker-end="url(#d)"/>

  <!-- Providers -->
  <g transform="translate(150,616)">
    <g transform="translate(0,0)"><rect class="card" width="180" height="48" rx="10"/><text class="ink" x="90" y="29" text-anchor="middle" font-size="13" font-weight="600">Docker</text></g>
    <g transform="translate(210,0)"><rect class="card" width="180" height="48" rx="10"/><text class="ink" x="90" y="29" text-anchor="middle" font-size="13" font-weight="600">PostgreSQL 16</text></g>
    <g transform="translate(420,0)"><rect class="card" width="180" height="48" rx="10"/><text class="ink" x="90" y="29" text-anchor="middle" font-size="13" font-weight="600">Local filesystem</text></g>
  </g>
</svg>
