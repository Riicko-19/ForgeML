<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" width="1200" height="360" fill="none" role="img" aria-label="ForgeML — ship a model as a versioned prediction API. Pipeline: build, deploy, activate, predict.">
  <defs>
    <linearGradient id="sheen" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0.7"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="wm">
      <text x="600" y="176" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="94" font-weight="800" letter-spacing="-2.5">ForgeML</text>
    </clipPath>
    <style>
      .surface { fill: #ffffff; }
      .frame   { stroke: #e6e9ee; }
      .tick     { stroke: #d7dce3; }
      .wmfill  { fill: #0b1220; }
      .kicker  { fill: #6b7480; }
      .tag     { fill: #2b333f; }
      .sub     { fill: #5b6572; }
      .chip     { fill: #f6f8fa; stroke: #e0e5ea; }
      .chipT    { fill: #2b333f; }
      .arrow    { stroke: #b6bdc6; }
      .accent   { fill: #2563eb; }
      .greenC   { fill: #eafaf3; stroke: #b7ead4; }
      .greenT   { fill: #0f9d6b; }
      @media (prefers-color-scheme: dark) {
        .surface { fill: #0d1117; }
        .frame   { stroke: #222932; }
        .tick     { stroke: #2d353f; }
        .wmfill  { fill: #f0f6fc; }
        .kicker  { fill: #7d8590; }
        .tag     { fill: #d5dde5; }
        .sub     { fill: #8b949e; }
        .chip     { fill: #161b22; stroke: #2a323b; }
        .chipT    { fill: #d5dde5; }
        .arrow    { stroke: #3d444d; }
        .accent   { fill: #4c8dff; }
        .greenC   { fill: #10231c; stroke: #1f5a44; }
        .greenT   { fill: #33b088; }
      }
      text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; }
      .sheen { animation: sweep 5.5s ease-in-out infinite; }
      @keyframes sweep { 0% { transform: translateX(-380px);} 60% { transform: translateX(380px);} 100% { transform: translateX(380px);} }
      .flow { animation: travel 5.5s ease-in-out infinite; }
      @keyframes travel { 0%{transform:translateX(0);opacity:0} 8%{opacity:1} 92%{opacity:1} 100%{transform:translateX(534px);opacity:0} }
      @media (prefers-reduced-motion: reduce) { .sheen{transform:translateX(220px)} .flow{opacity:0} }
    </style>
  </defs>

  <rect class="surface" width="1200" height="360" rx="16"/>
  <rect class="frame" x="0.5" y="0.5" width="1199" height="359" rx="16" fill="none"/>
  <!-- technical corner ticks -->
  <path class="tick" d="M40 24V40H56M1160 24V40H1144M40 336V320H56M1160 336V320H1144" stroke-width="1.2"/>

  <text class="kicker" x="600" y="70" text-anchor="middle" font-size="13" font-weight="600" letter-spacing="4">MODEL&#160;&#160;DEPLOYMENT&#160;&#160;CONTROL&#160;&#160;PLANE</text>

  <g clip-path="url(#wm)">
    <rect class="wmfill" x="300" y="86" width="600" height="112"/>
    <rect class="sheen" x="300" y="80" width="150" height="124" fill="url(#sheen)" transform="skewX(-16)"/>
  </g>

  <text class="tag" x="600" y="238" text-anchor="middle" font-size="25" font-weight="650">Ship a model as a versioned prediction API.</text>
  <text class="sub" x="600" y="267" text-anchor="middle" font-size="16">You write <tspan font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="15">predict()</tspan>. ForgeML builds, hardens, versions, and routes it — no Docker, no FastAPI.</text>

  <!-- step pipeline: build -> deploy -> activate -> predict -->
  <g transform="translate(0,312)">
    <!-- chips -->
    <g transform="translate(333,0)"><rect class="chip" x="-56" y="-16" width="112" height="32" rx="16"/><text class="chipT" x="0" y="5" text-anchor="middle" font-size="13.5" font-weight="600">Build</text></g>
    <g transform="translate(511,0)"><rect class="chip" x="-56" y="-16" width="112" height="32" rx="16"/><text class="chipT" x="0" y="5" text-anchor="middle" font-size="13.5" font-weight="600">Deploy</text></g>
    <g transform="translate(689,0)"><rect class="chip" x="-56" y="-16" width="112" height="32" rx="16"/><text class="chipT" x="0" y="5" text-anchor="middle" font-size="13.5" font-weight="600">Activate</text></g>
    <g transform="translate(867,0)"><rect class="greenC" x="-56" y="-16" width="112" height="32" rx="16"/><text class="greenT" x="0" y="5" text-anchor="middle" font-size="13.5" font-weight="700">Predict</text></g>
    <!-- connectors -->
    <path class="arrow" d="M389 0h66" stroke-width="1.5" marker-end="url(#ah)"/>
    <path class="arrow" d="M567 0h66" stroke-width="1.5" marker-end="url(#ah)"/>
    <path class="arrow" d="M745 0h66" stroke-width="1.5" marker-end="url(#ah)"/>
    <!-- traveling accent dot -->
    <circle class="flow accent" cx="333" cy="0" r="3.5"/>
  </g>
  <defs>
    <marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 1L8 5L0 9" fill="none" stroke="#b6bdc6" stroke-width="1.5"/>
    </marker>
  </defs>
</svg>
