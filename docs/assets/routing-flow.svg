<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 340" width="1200" height="340" fill="none" role="img" aria-label="Prediction routing: a client request is resolved to the active version, input-validated, health-gated, then forwarded. Failures map to 422, 503, or 502.">
  <style>
    .surface{fill:#ffffff}.frame{stroke:#e6e9ee}
    .card{fill:#ffffff;stroke:#e2e6ea}
    .gate{fill:#f6f8fa;stroke:#dfe4ea}
    .ok{fill:#f0faf5;stroke:#bde8d3}
    .err{fill:#fdf6ee;stroke:#f0dcc0}
    .ink{fill:#0b1220}.sub{fill:#59636e}.faint{fill:#8a94a1}
    .edge{stroke:#c2c9d2}.eerr{stroke:#e2c79e}
    .green{fill:#0f9d6b}.amber{fill:#b45309}
    text{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif}
    .mono{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}
    .lbl{fill:#8a94a1;font-size:10.5px;font-weight:600;letter-spacing:1.5}
    @media(prefers-color-scheme:dark){
      .surface{fill:#0d1117}.frame{stroke:#222932}
      .card{fill:#0f141b;stroke:#242c35}
      .gate{fill:#161b22;stroke:#2a323b}
      .ok{fill:#0f2019;stroke:#1f5540}
      .err{fill:#231a10;stroke:#5a4626}
      .ink{fill:#e6edf3}.sub{fill:#9aa4af}.faint{fill:#6b7480}
      .edge{stroke:#3a424c}.eerr{stroke:#5a4626}
      .green{fill:#33b088}.amber{fill:#d19a3a}
    }
  </style>
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 1L8 5L0 9" fill="none" stroke="#c2c9d2" stroke-width="1.5"/></marker>
    <marker id="ae" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 1L8 5L0 9" fill="none" stroke="#e2c79e" stroke-width="1.5"/></marker>
  </defs>
  <rect class="surface" width="1200" height="340" rx="14"/>
  <rect class="frame" x="0.5" y="0.5" width="1199" height="339" rx="14" fill="none"/>

  <text class="ink" x="40" y="46" font-size="18" font-weight="700">Prediction routing</text>
  <text class="sub mono" x="40" y="67" font-size="12.5">POST /v1/deployments/{name}/predict</text>
  <text class="faint" x="1160" y="46" text-anchor="end" font-size="12">The client never sees a container, image, or endpoint.</text>

  <!-- main path -->
  <g transform="translate(40,110)">
    <rect class="card" width="150" height="56" rx="10"/><text class="ink" x="75" y="27" text-anchor="middle" font-size="13" font-weight="600">Client</text><text class="faint" x="75" y="44" text-anchor="middle" font-size="10.5">JSON in / JSON out</text>
  </g>
  <g transform="translate(232,110)"><rect class="gate" width="176" height="56" rx="10"/><text class="lbl" x="88" y="23" text-anchor="middle">RESOLVE</text><text class="ink" x="88" y="42" text-anchor="middle" font-size="12.5">active version</text></g>
  <g transform="translate(450,110)"><rect class="gate" width="176" height="56" rx="10"/><text class="lbl" x="88" y="23" text-anchor="middle">VALIDATE</text><text class="ink" x="88" y="42" text-anchor="middle" font-size="12.5">input schema</text></g>
  <g transform="translate(668,110)"><rect class="gate" width="176" height="56" rx="10"/><text class="lbl" x="88" y="23" text-anchor="middle">HEALTH</text><text class="ink" x="88" y="42" text-anchor="middle" font-size="12.5">runtime inspect</text></g>
  <g transform="translate(886,110)"><rect class="gate" width="176" height="56" rx="10"/><text class="lbl" x="88" y="23" text-anchor="middle">FORWARD</text><text class="ink" x="88" y="42" text-anchor="middle" font-size="12.5">gateway → runtime</text></g>
  <g transform="translate(1104,110)"><rect class="ok" width="56" height="56" rx="10"/><text class="green" x="28" y="34" text-anchor="middle" font-size="13" font-weight="700">200</text></g>

  <!-- forward edges -->
  <path class="edge" d="M190 138h38" stroke-width="1.6" marker-end="url(#a)"/>
  <path class="edge" d="M408 138h38" stroke-width="1.6" marker-end="url(#a)"/>
  <path class="edge" d="M626 138h38" stroke-width="1.6" marker-end="url(#a)"/>
  <path class="edge" d="M844 138h38" stroke-width="1.6" marker-end="url(#a)"/>
  <path class="edge" d="M1062 138h38" stroke-width="1.6" marker-end="url(#a)"/>

  <!-- error exits -->
  <g transform="translate(0,232)">
    <g transform="translate(232,0)"><rect class="err" width="176" height="46" rx="10"/><text class="amber mono" x="16" y="21" font-size="12.5" font-weight="700">503</text><text class="sub" x="16" y="37" font-size="11">deployment_unavailable</text></g>
    <g transform="translate(450,0)"><rect class="err" width="176" height="46" rx="10"/><text class="amber mono" x="16" y="21" font-size="12.5" font-weight="700">422</text><text class="sub" x="16" y="37" font-size="11">prediction_input_invalid</text></g>
    <g transform="translate(668,0)"><rect class="err" width="176" height="46" rx="10"/><text class="amber mono" x="16" y="21" font-size="12.5" font-weight="700">503</text><text class="sub" x="16" y="37" font-size="11">deployment_unavailable</text></g>
    <g transform="translate(886,0)"><rect class="err" width="176" height="46" rx="10"/><text class="amber mono" x="16" y="21" font-size="12.5" font-weight="700">502</text><text class="sub" x="16" y="37" font-size="11">prediction_runtime_failed</text></g>
  </g>
  <path class="eerr" d="M320 166v58" stroke-width="1.4" marker-end="url(#ae)" stroke-dasharray="3 4"/>
  <path class="eerr" d="M538 166v58" stroke-width="1.4" marker-end="url(#ae)" stroke-dasharray="3 4"/>
  <path class="eerr" d="M756 166v58" stroke-width="1.4" marker-end="url(#ae)" stroke-dasharray="3 4"/>
  <path class="eerr" d="M974 166v58" stroke-width="1.4" marker-end="url(#ae)" stroke-dasharray="3 4"/>

  <text class="faint" x="40" y="306" font-size="11.5">Errors carry no runtime detail — the model's own error stays in protected logs (502 is opaque by design).</text>
</svg>
