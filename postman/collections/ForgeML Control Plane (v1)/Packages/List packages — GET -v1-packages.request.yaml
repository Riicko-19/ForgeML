$kind: http-request
name: List packages — GET /v1/packages
description: |-
  **List packages, newest first.**

  Keyset pagination: pass the previous response's `next_cursor` back as `cursor`. The cursor is **opaque** — do not construct one by hand; it encodes internal ordering keys and its format is not a contract. `next_cursor` is `null` on the last page.

  **422** — `limit` outside 1–100.
  **400 `cursor_invalid`** — a cursor we did not issue.
url: "{{baseUrl}}/v1/packages?limit=50"
method: GET
queryParams:
  - key: limit
    value: "50"
    description: 1–100. Default 50. Outside that range is a 422.
  - key: cursor
    value: ""
    disabled: true
    description: Opaque cursor from a previous page's next_cursor. Disabled by default.
scripts:
  - type: afterResponse
    code: |-
      pm.test('200 OK', () => pm.response.to.have.status(200));
      const page = pm.response.json();

      pm.test('Returns a page', function () {
          pm.expect(page.items).to.be.an('array');
          pm.expect(page).to.have.property('next_cursor');
      });

      pm.test('Ordered newest first', function () {
          const times = page.items.map(i => Date.parse(i.created_at));
          const sorted = [...times].sort((a, b) => b - a);
          pm.expect(times).to.eql(sorted);
      });

      if (page.next_cursor) {
          pm.environment.set('cursor', page.next_cursor);
          console.log('More pages. Enable the cursor query param and re-send.');
      }
    language: text/javascript
settings: {}
examples: ./.resources/List packages — GET -v1-packages.resources/examples
order: 3000
