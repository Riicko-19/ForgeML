$kind: http-request
name: Poll operation ÔÇö GET /v1/operations/{id}
description: |-
  **Poll a durable operation.**

  States: `pending` Ôćĺ `running` Ôćĺ `succeeded` | `failed`. The terminal states are **immutable** ÔÇö the database enforces it ÔÇö so a poll is always truthful.

  Validation currently runs inside the upload request, so an operation is usually already `succeeded` by the time you first poll it. That will stay true from the client's point of view when the work moves to a background worker: this contract exists precisely so that change is invisible to you.

  - `state: succeeded` Ôćĺ `result.package_id` and `result.validation_state`. **Note that `succeeded` says the validation *ran*, not that the package was accepted.** Read the package for the verdict.
  - `state: failed` Ôćĺ `failure.code` ÔÇö the platform could not do the work (for example `artifact_unreadable`). This is *not* a bad package.

  `{{operationId}}` is set automatically by the Upload request.

  **404 `operation_not_found`** ÔÇö unknown id.
url: "{{baseUrl}}/v1/operations/{{operationId}}"
method: GET
scripts:
  - type: afterResponse
    code: |-
      pm.test('200 OK', () => pm.response.to.have.status(200));
      const op = pm.response.json();

      pm.test('State is one of the four lifecycle states', function () {
          pm.expect(op.state).to.be.oneOf(['pending', 'running', 'succeeded', 'failed']);
      });

      pm.test('A terminal operation has a completion time', function () {
          if (op.state === 'succeeded' || op.state === 'failed') {
              pm.expect(op.completed_at).to.not.eql(null);
          }
      });

      if (op.state === 'succeeded') {
          pm.test('Result references the package', function () {
              pm.expect(op.result).to.have.property('package_id');
              pm.expect(op.result).to.have.property('validation_state');
          });
          pm.test('A succeeded operation carries no failure', () => pm.expect(op.failure).to.eql(null));
          pm.environment.set('packageId', op.result.package_id);
          console.log('validation_state =', op.result.validation_state, '(read the package for findings)');
      }

      if (op.state === 'failed') {
          pm.test('A failed operation explains the platform fault', function () {
              pm.expect(op.failure).to.have.property('code');
          });
          console.warn('Platform fault, not a bad package:', op.failure.code);
      }
    language: text/javascript
settings: {}
examples: ./.resources/Poll operation ÔÇö GET -v1-operations-{id}.resources/examples
order: 1000
