$kind: http-request
name: Liveness — GET /healthz
description: |-
  **Is the process alive?**

  Answers 200 as soon as the process is up. It does **not** check the database — that is what `/readyz` is for. An orchestrator should use this as its liveness probe, or it will kill a healthy process during a database blip.

  **200** — `{status: "ok", service, version}`
url: "{{baseUrl}}/healthz"
method: GET
scripts:
  - type: afterResponse
    code: |-
      pm.test('200 OK', () => pm.response.to.have.status(200));
      const body = pm.response.json();
      pm.test('Reports ok', () => pm.expect(body.status).to.eql('ok'));
      pm.test('Identifies the service', () => pm.expect(body.service).to.eql('forgeml-control-plane'));
      pm.test('Exposes no extra fields', () => pm.expect(Object.keys(body).sort()).to.eql(['service','status','version']));
    language: text/javascript
settings: {}
examples: ./.resources/Liveness — GET -healthz.resources/examples
order: 1000
